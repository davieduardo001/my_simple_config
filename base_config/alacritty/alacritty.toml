# Alacritty — porte 1:1 da config antiga do Ghostty (tema Min Dark).
# Formato TOML (alacritty >= 0.13).

[env]
TERM = "alacritty"

# --- Font ---
[font]
size = 11

[font.normal]
family = "JetBrainsMono Nerd Font Mono"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font Mono"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font Mono"
style = "Italic"

# --- Window ---
[window]
padding = { x = 10, y = 10 }
dynamic_padding = false
decorations = "full"
opacity = 1.0

# --- Scrollback ---
[scrolling]
history = 10000

# --- Cursor ---
[cursor]
style = { shape = "Block", blinking = "On" }

# --- Theme (Min Dark) ---
[colors.primary]
background = "#1f1f1f"
foreground = "#d4d4d4"

[colors.cursor]
cursor = "#fafafa"
text = "#1f1f1f"

[colors.selection]
background = "#2a2a2a"
text = "#f5f5f5"

[colors.normal]
black   = "#1a1a1a"
red     = "#f97583"
green   = "#8fae6a"
yellow  = "#ffab70"
blue    = "#79b8ff"
magenta = "#b392f0"
cyan    = "#9db1c5"
white   = "#b0b0b0"

[colors.bright]
black   = "#5c5c5c"
red     = "#ff7a84"
green   = "#a8d477"
yellow  = "#ffcb99"
blue    = "#a3d1ff"
magenta = "#d1baf7"
cyan    = "#c3d3e0"
white   = "#fafafa"

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"
