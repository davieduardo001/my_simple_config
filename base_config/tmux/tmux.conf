# O alacritty não tem abas nem splits nativos (o ghostty tinha) — quem faz
# esse papel agora é o tmux. Prefixo padrão: Ctrl+b.

# -c "#{pane_current_path}": abas/splits novos herdam o diretório atual
bind t new-window -c "#{pane_current_path}"        # nova "aba" (window no tmux)
bind w kill-pane                                   # fecha o split/pane atual
bind | split-window -h -c "#{pane_current_path}"   # split vertical
bind - split-window -v -c "#{pane_current_path}"   # split horizontal

set -g mouse on
set -g base-index 1
set -g history-limit 10000
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",alacritty:RGB"
