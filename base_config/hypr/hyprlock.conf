# hyprlock — tela de bloqueio grayscale
source = ~/.config/hypr/colors.conf

general {
    hide_cursor = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    brightness = 0.45
    contrast = 0.9
}

input-field {
    monitor =
    size = 300, 48
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    outer_color = $border
    inner_color = $surface
    font_color = $text_hi
    fade_on_empty = true
    placeholder_text = <i>senha…</i>
    rounding = 12
    position = 0, -80
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = $text_hi
    font_size = 72
    font_family = JetBrainsMono Nerd Font
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    color = $text_dim
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = 0, 40
    halign = center
    valign = center
}
