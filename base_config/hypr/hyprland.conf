# ------------------------------------------------------------------
# Hyprland — rice grayscale
# Paleta: colors.conf (gerada a partir de ansible/group_vars/all.yml)
# ------------------------------------------------------------------

source = ~/.config/hypr/colors.conf

monitor = , preferred, auto, 1

# --- Env ---
env = XCURSOR_THEME,macOS
env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORM,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,auto
# sem isto, apps Qt (Dolphin, OnlyOffice...) ignoram o tema escuro e abrem brancos
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_STYLE_OVERRIDE,Fusion

# --- Input ---
input {
    kb_layout = us
    follow_mouse = 1

    touchpad {
        natural_scroll = true
    }
}

# --- General ---
general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2
    col.active_border = $border_hi
    col.inactive_border = $border
    layout = dwindle
    resize_on_border = true
}

dwindle {
    preserve_split = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}

source = ~/.config/hypr/conf.d/decoration.conf
source = ~/.config/hypr/conf.d/animations.conf
source = ~/.config/hypr/conf.d/rules.conf
source = ~/.config/hypr/conf.d/autostart.conf
source = ~/.config/hypr/conf.d/binds.conf
