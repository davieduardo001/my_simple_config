# Sintaxe 0.55+: cada item separado por vírgula é "campo valor";
# matchers levam o prefixo match:. Efeitos válidos p/ layer:
# animation, blur, blur_popups, ignore_alpha, dim_around, xray, order,
# no_anim, above_lock, no_screen_share.

# --- Layer rules ---
# O control center (swaync) desliza da direita, estilo celular — a animação
# é do compositor, não do CSS
layerrule = animation slide right, blur true, ignore_alpha 0, match:namespace ^(swaync-control-center)$
layerrule = animation slide top, blur true, ignore_alpha 0, match:namespace ^(swaync-notification-window)$
layerrule = blur true, ignore_alpha 0, match:namespace ^(waybar)$
layerrule = blur true, ignore_alpha 0, match:namespace ^(rofi)$

# --- Window rules ---
# Apps que fazem mais sentido flutuando (estilo Windows) do que em tile.
# Pra deixar TUDO flutuando, descomente a linha abaixo:
# windowrule = float true, match:class .*
windowrule = float true, size 1000 650, match:class ^(thunar|Thunar)$
windowrule = float true, size 420 560, match:class ^(gnome-calculator|org.gnome.Calculator)$
windowrule = float true, match:title ^(Picture-in-Picture)$
windowrule = float true, match:class ^(org.pulseaudio.pavucontrol|pavucontrol)$
windowrule = float true, match:class ^(com.gabm.satty)$
windowrule = float true, match:class ^(xdg-desktop-portal-gtk)$
windowrule = float true, match:class ^(blueman-manager)$
