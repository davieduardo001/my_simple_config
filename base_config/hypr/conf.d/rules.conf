# --- Layer rules ---
# O control center (swaync) desliza da direita, estilo celular — a animação
# é do compositor, não do CSS
layerrule = animation slide right, swaync-control-center
layerrule = blur, swaync-control-center
layerrule = ignorezero, swaync-control-center
layerrule = animation slide top, swaync-notification-window
layerrule = blur, swaync-notification-window
layerrule = ignorezero, swaync-notification-window
layerrule = blur, waybar
layerrule = ignorezero, waybar
layerrule = blur, rofi
layerrule = ignorezero, rofi

# --- Window rules ---
windowrule = float, title:^(Picture-in-Picture)$
windowrule = float, class:^(org.pulseaudio.pavucontrol|pavucontrol)$
windowrule = float, class:^(com.gabm.satty)$
windowrule = float, class:^(xdg-desktop-portal-gtk)$
