# --- Layer rules ---
# O control center (swaync) desliza da direita, estilo celular — a animação
# é do compositor, não do CSS
layerrule = animation slide right, class:^(swaync-control-center)$
layerrule = blur, class:^(swaync-control-center)$
layerrule = ignorezero, class:^(swaync-control-center)$
layerrule = animation slide top, class:^(swaync-notification-window)$
layerrule = blur, class:^(swaync-notification-window)$
layerrule = ignorezero, class:^(swaync-notification-window)$
layerrule = blur, class:^(waybar)$
layerrule = ignorezero, class:^(waybar)$
layerrule = blur, class:^(rofi)$
layerrule = ignorezero, class:^(rofi)$

# --- Window rules ---
windowrule = float, title:^(Picture-in-Picture)$
windowrule = float, class:^(org.pulseaudio.pavucontrol|pavucontrol)$
windowrule = float, class:^(com.gabm.satty)$
windowrule = float, class:^(xdg-desktop-portal-gtk)$
