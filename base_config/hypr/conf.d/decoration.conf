# Cantos, blur e sombra — o "vidro fosco" do rice
decoration {
    rounding = 10

    active_opacity = 1.0
    inactive_opacity = 0.97

    blur {
        enabled = true
        size = 6
        passes = 3
        ignore_opacity = true
        new_optimizations = true
    }

    shadow {
        enabled = true
        range = 18
        render_power = 3
        color = rgba(00000066)
    }
}
