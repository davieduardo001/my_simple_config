# Curvas bezier custom — animações fluidas sem exagero
animations {
    enabled = true

    bezier = smooth, 0.25, 0.1, 0.25, 1.0
    bezier = snap, 0.16, 1.0, 0.3, 1.0
    bezier = slide, 0.4, 0.0, 0.2, 1.0

    animation = windows, 1, 4, snap, popin 85%
    animation = windowsOut, 1, 4, smooth, popin 85%
    animation = fade, 1, 4, smooth
    animation = border, 1, 6, smooth
    animation = workspaces, 1, 5, slide, slide
    animation = layers, 1, 4, slide, slide
    animation = specialWorkspace, 1, 4, snap, slidevert
}
