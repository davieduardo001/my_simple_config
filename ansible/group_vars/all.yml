---
# --- Pacman packages ---
pacman_packages:
  - base-devel
  - git
  - curl
  - wget
  - unzip
  - openssl
  - zlib
  - xz
  - readline
  - sqlite
  - github-cli
  - fastfetch
  - fontconfig
  - starship
  - eza
  - bat
  - zoxide
  - fzf
  - btop
  - timeshift
  - reflector

# --- AUR packages ---
aur_packages:
  - brave-bin
  - visual-studio-code-bin
  - ghostty

# --- Nerd Fonts ---
nerd_fonts_version: "v3.4.0"
nerd_fonts:
  - CaskaydiaCove
  - JetBrainsMono

# --- NVM ---
nvm_version: "v0.40.1"

# --- Icon/cursor/GTK theming (DE-agnostic assets) ---
theming_aur_packages:
  - mcmojave-circle-icon-theme-git
  - whitesur-icon-theme-git
  - fluent-icon-theme-git
  - quintom-cursor-theme-git
  - apple_cursor

theming_icon_theme: "McMojave-circle"
theming_cursor_theme: "macOS"
theming_gtk_theme: "Adwaita"

# --- Flatpak apps (both profiles) ---
flatpak_apps:
  - app.zen_browser.zen

# --- Flatpak apps: server profile only (TV box media) ---
flatpak_apps_server:
  - org.libretro.RetroArch
  - tv.kodi.Kodi

# --- Rofi (Spotlight-style launcher, DE-agnostic shortcut) ---
rofi_aur_packages:
  - rofi-themes-collection-git
rofi_shortcut: "<Super>space"
# rofi crashes on native Wayland ("requires layer shell protocol") on non-wlroots
# compositors (Mutter/GNOME, KWin/KDE); forcing XWayland (unset WAYLAND_DISPLAY)
# fixes the crash but Mutter won't hand keyboard focus to an override-redirect
# window, so -normal-window is required too.
rofi_command: "env -u WAYLAND_DISPLAY rofi -show drun -normal-window"
