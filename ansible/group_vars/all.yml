---
# Toda instalação de pacote usa paru (repo oficial e AUR), dentro da janela
# sudoers do site.yml. A única exceção é o bootstrap do próprio paru.

# --- Pacotes base (repo oficial, via paru) ---
pacman_packages:
  - base-devel
  - git
  - curl
  - wget
  - unzip
  - openssl
  - zlib
  - xz
  - readline
  - sqlite
  - github-cli
  - fastfetch
  - fontconfig
  - starship
  - eza
  - bat
  - zoxide
  - fzf
  - btop
  - tmux
  - timeshift
  - reflector

# --- Pacotes legados a remover (idempotente) ---
packages_absent:
  - visual-studio-code-bin
  - rofi-themes-collection-git
  - rofi
  - brave-bin
  - swww
  - hyprpaper
  - ghostty                # substituído por alacritty
  - thunar                 # substituído por dolphin
  - thunar-volman
  - tumbler                # thumbnailers do thunar — o dolphin usa kio-extras
  - ffmpegthumbnailer
  - file-roller            # substituído por ark
  - mcmojave-circle-icon-theme-git
  - whitesur-icon-theme-git
  - fluent-icon-theme-git
  - quintom-cursor-theme-git

# --- AUR packages ---
# Vazio hoje: o alacritty veio do repo oficial e o ghostty saiu. Os únicos
# pacotes AUR que sobraram vivem em desktop_apps e claude_packages.
aur_packages: []

# --- Claude Code ---
# Pacote AUR, não npm -g: assim o update entra no `paru -Syu` junto com o resto.
claude_packages:
  - claude-code

# --- Hyprland desktop ---
hyprland_packages:
  - hyprland
  - xdg-desktop-portal-hyprland
  - xdg-desktop-portal-gtk
  - hyprlock
  - hypridle
  - hyprpolkitagent
  - waybar
  - swaync
  - rofi-wayland
  - alacritty
  - swaybg
  - cliphist
  - grim
  - slurp
  - satty
  - wl-clipboard
  - brightnessctl
  - playerctl
  - pavucontrol
  - pipewire
  - pipewire-alsa
  - pipewire-pulse
  - wireplumber
  - qt5-wayland
  - qt6-wayland
  - noto-fonts
  - noto-fonts-emoji

# --- Apps desktop ---
default_browser: "firefox.desktop"

desktop_apps:
  - nwg-displays         # GUI de monitores — escreve o hypr/monitors.conf
  - dolphin
  - kio-extras           # miniaturas, rede (smb/sftp), dispositivos
  - ffmpegthumbs         # miniaturas de vídeo
  - ark                  # abrir/criar zip, tar, rar
  - gvfs                 # lixeira/montagem — ainda usado por apps GTK
  - onlyoffice-bin
  - gnome-calculator
  - syncthing
  - localsend-bin
  - firefox
  - chromium

# --- Rede + Bluetooth (toggles do swaync dependem disso) ---
network_packages:
  - networkmanager
  - bluez
  - bluez-utils
  - blueman
network_services:
  - NetworkManager.service
  - bluetooth.service

# Data/hora via NTP (systemd-timesyncd), habilitado pela role network
system_timezone: America/Sao_Paulo

# --- Login (greetd + tuigreet) ---
greetd_packages:
  - greetd
  - greetd-tuigreet

# --- Neovim / LazyVim ---
neovim_packages:
  - neovim
  - ripgrep
  - fd
  - lazygit
lazyvim_repo: "https://github.com/davieduardo001/lazyvim-config"
lazyvim_dest: "{{ ansible_env.HOME }}/.config/nvim"

# --- Nerd Fonts (pacotes oficiais, via paru) ---
fonts_packages:
  - ttf-cascadia-code-nerd
  - ttf-jetbrains-mono-nerd

# --- Icon/cursor/GTK theming ---
theming_packages:
  - papirus-icon-theme
  - apple_cursor
  - qt5ct               # tema escuro p/ apps Qt5
  - qt6ct               # tema escuro p/ apps Qt6 (Dolphin etc.)
  - adwaita-qt5         # dá aos apps Qt o visual do Adwaita
  - adwaita-qt6

theming_icon_theme: "Papirus-Dark"
theming_cursor_theme: "macOS"
theming_gtk_theme: "Adwaita"

# --- Paleta grayscale: única fonte de verdade das cores do rice ---
# A role theming renderiza estes valores em base_config/hypr/colors.conf,
# base_config/waybar/colors.css, base_config/swaync/colors.css e
# base_config/rofi/colors.rasi (todos versionados). Trocar a paleta aqui e
# re-rodar `--tags theming` re-tematiza o desktop inteiro.
theme_palette:
  bg: "0a0a0a"
  bg_alt: "121212"
  surface: "1a1a1a"
  surface2: "242424"
  border: "3a3a3a"
  border_hi: "5a5a5a"
  text_dim: "8a8a8a"
  text: "d4d4d4"
  text_hi: "eeeeee"

# --- Flatpak apps (infra fica pronta; nenhum app por padrão) ---
flatpak_apps: []

# Flatpaks legados a remover
flatpak_apps_absent:
  - app.zen_browser.zen
