---
- name: Install greetd packages
  ansible.builtin.include_role:
    name: paru_install
  vars:
    paru_packages: "{{ greetd_packages }}"
    paru_label: greetd

- name: Configure greetd (tuigreet → Hyprland)
  become: true
  ansible.builtin.template:
    src: config.toml.j2
    dest: /etc/greetd/config.toml
    mode: "0644"

- name: Detect previously enabled display managers
  ansible.builtin.command:
    cmd: "systemctl is-enabled {{ item }}"
  loop:
    - gdm.service
    - sddm.service
    - lightdm.service
    - lxdm.service
  register: dm_check
  failed_when: false
  changed_when: false

- name: Disable previous display manager (takes effect on next boot)
  become: true
  ansible.builtin.systemd:
    name: "{{ item.item }}"
    enabled: false
  loop: "{{ dm_check.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: item.stdout == 'enabled'

# enabled mas NÃO started: a troca de display manager só acontece no próximo
# boot, pra não derrubar a sessão gráfica de onde o playbook está rodando
- name: Enable greetd
  become: true
  ansible.builtin.systemd:
    name: greetd.service
    enabled: true
