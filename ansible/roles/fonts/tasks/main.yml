---
- name: Check which font packages are already installed
  ansible.builtin.command:
    cmd: "pacman -Q {{ item }}"
  loop: "{{ fonts_packages }}"
  register: fonts_check
  failed_when: false
  changed_when: false

# fc-cache roda sozinho via hook do pacman
- name: Install missing font packages via paru
  ansible.builtin.shell:
    cmd: "paru -S --needed --noconfirm {{ fonts_check.results | selectattr('rc', 'ne', 0) | map(attribute='item') | join(' ') }}"
    executable: /bin/bash
  when: fonts_check.results | selectattr('rc', 'ne', 0) | list | length > 0
  changed_when: true
