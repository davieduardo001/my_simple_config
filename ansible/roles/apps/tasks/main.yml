---
- name: Install desktop apps
  ansible.builtin.include_role:
    name: paru_install
  vars:
    paru_packages: "{{ desktop_apps }}"
    paru_label: apps

- name: Enable and start Syncthing for the current user
  become: true
  ansible.builtin.systemd:
    name: "syncthing@{{ ansible_user_id }}.service"
    enabled: true
    state: started

- name: Check current default browser
  ansible.builtin.command:
    cmd: xdg-settings get default-web-browser
  register: browser_check
  failed_when: false
  changed_when: false

- name: Set default browser
  ansible.builtin.command:
    cmd: "xdg-settings set default-web-browser {{ default_browser }}"
  when: browser_check.stdout | default('') != default_browser
  changed_when: true

# xdg-settings cobre http/https; estes dois pegam arquivos .html abertos
# pelo gerenciador de arquivos
- name: Set default handler for local HTML files
  ansible.builtin.command:
    cmd: "xdg-mime default {{ default_browser }} {{ item }}"
  loop:
    - text/html
    - application/xhtml+xml
  changed_when: true
