---
- name: Check which desktop apps are already installed
  ansible.builtin.command:
    cmd: "pacman -Q {{ item }}"
  loop: "{{ desktop_apps }}"
  register: apps_check
  failed_when: false
  changed_when: false

- name: Install missing desktop apps via paru
  ansible.builtin.shell:
    cmd: "paru -S --needed --noconfirm {{ apps_check.results | selectattr('rc', 'ne', 0) | map(attribute='item') | join(' ') }}"
    executable: /bin/bash
  when: apps_check.results | selectattr('rc', 'ne', 0) | list | length > 0
  changed_when: true

- name: Enable and start Syncthing for the current user
  become: true
  ansible.builtin.systemd:
    name: "syncthing@{{ ansible_user_id }}.service"
    enabled: true
    state: started

- name: Check current default browser
  ansible.builtin.command:
    cmd: xdg-settings get default-web-browser
  register: browser_check
  failed_when: false
  changed_when: false

- name: Set default browser
  ansible.builtin.command:
    cmd: "xdg-settings set default-web-browser {{ default_browser }}"
  when: browser_check.stdout | default('') != default_browser
  changed_when: true

# xdg-settings cobre http/https; estes dois pegam arquivos .html abertos
# pelo gerenciador de arquivos
- name: Set default handler for local HTML files
  ansible.builtin.command:
    cmd: "xdg-mime default {{ default_browser }} {{ item }}"
  loop:
    - text/html
    - application/xhtml+xml
  changed_when: true
