---
- name: Check which Hyprland packages are already installed
  ansible.builtin.command:
    cmd: "pacman -Q {{ item }}"
  loop: "{{ hyprland_packages }}"
  register: hyprland_check
  failed_when: false
  changed_when: false

- name: Install missing Hyprland packages via paru
  ansible.builtin.shell:
    cmd: "paru -S --needed --noconfirm {{ hyprland_check.results | selectattr('rc', 'ne', 0) | map(attribute='item') | join(' ') }}"
    executable: /bin/bash
  when: hyprland_check.results | selectattr('rc', 'ne', 0) | list | length > 0
  changed_when: true
