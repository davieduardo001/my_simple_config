---
- name: Ensure ~/.config directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config"
    state: directory
    mode: '0755'

- name: Backup existing .bashrc (if not already a symlink)
  ansible.builtin.copy:
    src: "{{ ansible_env.HOME }}/.bashrc"
    dest: "{{ ansible_env.HOME }}/.bashrc.bak"
    remote_src: true
    force: false
  failed_when: false

- name: Link .bashrc
  ansible.builtin.file:
    src: "{{ repo_root }}/base_config/bash/bashrc"
    dest: "{{ ansible_env.HOME }}/.bashrc"
    state: link
    force: true

- name: Check for pre-existing config dirs
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.config/{{ item }}"
  loop: "{{ dotfiles_links }}"
  register: dotfiles_stats

# Diretórios reais (ex.: o config autogerado do primeiro boot do Hyprland)
# bloqueiam a criação do symlink — move de lado com sufixo de timestamp
- name: Move aside real directories that would block the symlinks
  ansible.builtin.shell:
    cmd: 'mv "{{ item.stat.path }}" "{{ item.stat.path }}.bak.$(date +%s)"'
    executable: /bin/bash
  loop: "{{ dotfiles_stats.results }}"
  loop_control:
    label: "{{ item.item }}"
  when: item.stat.exists and not item.stat.islnk
  changed_when: true

- name: Link app configs into ~/.config
  ansible.builtin.file:
    src: "{{ repo_root }}/base_config/{{ item }}"
    dest: "{{ ansible_env.HOME }}/.config/{{ item }}"
    state: link
    force: true
  loop: "{{ dotfiles_links }}"

# gtk-3.0/ e qt6ct/ costumam ter outros arquivos do próprio app (bookmarks,
# estado), então linka arquivo por arquivo em vez do diretório inteiro
- name: Ensure parent dirs for file-level links exist
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config/{{ item | dirname }}"
    state: directory
    mode: '0755'
  loop: "{{ dotfiles_file_links }}"

- name: Link individual config files
  ansible.builtin.file:
    src: "{{ repo_root }}/base_config/{{ item }}"
    dest: "{{ ansible_env.HOME }}/.config/{{ item }}"
    state: link
    force: true
  loop: "{{ dotfiles_file_links }}"

- name: Link config files that live in $HOME
  ansible.builtin.file:
    src: "{{ repo_root }}/base_config/{{ item.src }}"
    dest: "{{ ansible_env.HOME }}/{{ item.dest }}"
    state: link
    force: true
  loop: "{{ dotfiles_home_links }}"
  loop_control:
    label: "{{ item.dest }}"

- name: Link wallpapers into ~/.config
  ansible.builtin.file:
    src: "{{ repo_root }}/wallpapers"
    dest: "{{ ansible_env.HOME }}/.config/wallpapers"
    state: link
    force: true
