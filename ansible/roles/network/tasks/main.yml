---
- name: Install network packages
  ansible.builtin.include_role:
    name: paru_install
  vars:
    paru_packages: "{{ network_packages }}"
    paru_label: rede/bluetooth

- name: Enable and start NetworkManager and Bluetooth
  become: true
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop: "{{ network_services }}"
