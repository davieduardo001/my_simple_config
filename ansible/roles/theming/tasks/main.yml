---
- name: Install theming packages
  ansible.builtin.include_role:
    name: paru_install
  vars:
    paru_packages: "{{ theming_packages }}"
    paru_label: tema

# A paleta grayscale (theme_palette em group_vars/all.yml) é renderizada para
# dentro de base_config/ — os arquivos gerados são versionados, então mudança
# de paleta aparece como diff no git.
- name: Render grayscale palette files
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ repo_root }}/base_config/{{ item.dest }}"
    mode: "0644"
  loop:
    - { src: colors.conf.j2, dest: hypr/colors.conf }
    - { src: colors.css.j2, dest: waybar/colors.css }
    - { src: colors.css.j2, dest: swaync/colors.css }
    - { src: colors.rasi.j2, dest: rofi/colors.rasi }
  loop_control:
    label: "{{ item.dest }}"

- name: Detect if a graphical session is available
  ansible.builtin.set_fact:
    theming_has_session: "{{ (lookup('env', 'DBUS_SESSION_BUS_ADDRESS') | length) > 0 }}"

- name: Warn when no graphical session is detected
  ansible.builtin.debug:
    msg: >-
      Nenhuma sessão gráfica detectada (DBUS_SESSION_BUS_ADDRESS vazio) — pulando
      aplicação de ícone/cursor/tema GTK. Rode com --tags theming de dentro da
      sessão Hyprland para aplicar.
  when: not theming_has_session

- name: Apply GTK theme via gsettings
  ansible.builtin.shell:
    cmd: "gsettings set org.gnome.desktop.interface {{ item.key }} '{{ item.value }}'"
    executable: /bin/bash
  loop:
    - { key: "icon-theme", value: "{{ theming_icon_theme }}" }
    - { key: "cursor-theme", value: "{{ theming_cursor_theme }}" }
    - { key: "gtk-theme", value: "{{ theming_gtk_theme }}" }
    - { key: "color-scheme", value: "prefer-dark" }
  loop_control:
    label: "{{ item.key }}"
  when: theming_has_session
  ignore_errors: true
  changed_when: true
