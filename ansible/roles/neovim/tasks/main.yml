---
- name: Install Neovim packages
  ansible.builtin.include_role:
    name: paru_install
  vars:
    paru_packages: "{{ neovim_packages }}"
    paru_label: neovim

- name: Check for existing ~/.config/nvim
  ansible.builtin.stat:
    path: "{{ lazyvim_dest }}"
  register: nvim_dir

- name: Clone LazyVim config
  ansible.builtin.git:
    repo: "{{ lazyvim_repo }}"
    dest: "{{ lazyvim_dest }}"
    version: HEAD
  when: not nvim_dir.stat.exists

- name: Check origin of existing nvim config
  ansible.builtin.command:
    cmd: "git -C {{ lazyvim_dest }} remote get-url origin"
  register: nvim_origin
  failed_when: false
  changed_when: false
  when: nvim_dir.stat.exists

- name: Warn when existing nvim config is not the LazyVim repo
  ansible.builtin.debug:
    msg: >-
      ~/.config/nvim já existe e não é um clone de {{ lazyvim_repo }} —
      mantido intocado. Faça backup e remova o diretório se quiser que o
      playbook clone a config LazyVim.
  when:
    - nvim_dir.stat.exists
    - (nvim_origin.rc | default(1)) != 0
      or 'davieduardo001/lazyvim-config' not in (nvim_origin.stdout | default(''))
